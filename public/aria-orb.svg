<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 340" width="280" height="340">
  <defs>
    <clipPath id="sphereClip">
      <circle cx="140" cy="155" r="108"/>
    </clipPath>

    <!-- Base warm orange fill -->
    <radialGradient id="gBase" cx="52%" cy="38%" r="72%" fx="52%" fy="32%">
      <stop offset="0%"   stop-color="#ffb87a"/>
      <stop offset="18%"  stop-color="#f07640"/>
      <stop offset="45%"  stop-color="#e85018"/>
      <stop offset="78%"  stop-color="#d04010"/>
      <stop offset="100%" stop-color="#b83208"/>
    </radialGradient>

    <!-- Blue-lavender patch — lower-left quadrant -->
    <radialGradient id="gBlue" cx="28%" cy="72%" r="58%" fx="25%" fy="70%">
      <stop offset="0%"   stop-color="#b0bee8" stop-opacity="0.95"/>
      <stop offset="35%"  stop-color="#9aaada" stop-opacity="0.80"/>
      <stop offset="65%"  stop-color="#8898cc" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7888be" stop-opacity="0"/>
    </radialGradient>

    <!-- Extra violet/periwinkle lower-center -->
    <radialGradient id="gViolet" cx="50%" cy="82%" r="42%">
      <stop offset="0%"   stop-color="#c0b0e0" stop-opacity="0.60"/>
      <stop offset="60%"  stop-color="#a898d0" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#9888c0" stop-opacity="0"/>
    </radialGradient>

    <!-- Warm peach lower-right -->
    <radialGradient id="gPeach" cx="78%" cy="80%" r="38%">
      <stop offset="0%"   stop-color="#f4c098" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#eca878" stop-opacity="0"/>
    </radialGradient>

    <!-- Frosted-glass top highlight (soft white top glow) -->
    <radialGradient id="gHighlight" cx="50%" cy="2%" r="58%">
      <stop offset="0%"   stop-color="#fff5ee" stop-opacity="0.72"/>
      <stop offset="55%"  stop-color="#fff5ee" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#fff5ee" stop-opacity="0"/>
    </radialGradient>

    <!-- Rim darkening at sphere edge -->
    <radialGradient id="gRim" cx="50%" cy="50%" r="50%">
      <stop offset="72%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="92%"  stop-color="#000000" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.32"/>
    </radialGradient>

    <!-- Translucent outer halo / frosted edge -->
    <radialGradient id="gHalo" cx="50%" cy="50%" r="50%">
      <stop offset="84%"  stop-color="#e8d8cc" stop-opacity="0"/>
      <stop offset="94%"  stop-color="#e8d8cc" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#d8c8bc" stop-opacity="0.55"/>
    </radialGradient>

    <!-- Drop shadow filter -->
    <filter id="fShadow" x="-25%" y="-15%" width="150%" height="145%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="rgba(190,100,40,0.30)"/>
    </filter>

    <!-- Star subtle glow -->
    <filter id="fStarGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ground shadow ellipse -->
  <ellipse cx="140" cy="278" rx="70" ry="13" fill="rgba(180,90,30,0.16)"/>

  <!-- Sphere — layered gradients for the multi-color look -->
  <g filter="url(#fShadow)">
    <!-- Base orange sphere -->
    <circle cx="140" cy="155" r="108" fill="url(#gBase)"/>
    <!-- Blue-lavender overlay (clipped to sphere) -->
    <circle cx="140" cy="155" r="108" fill="url(#gBlue)"      clip-path="url(#sphereClip)"/>
    <!-- Violet overlay -->
    <circle cx="140" cy="155" r="108" fill="url(#gViolet)"    clip-path="url(#sphereClip)"/>
    <!-- Peach lower-right overlay -->
    <circle cx="140" cy="155" r="108" fill="url(#gPeach)"     clip-path="url(#sphereClip)"/>
    <!-- Frosted top highlight -->
    <circle cx="140" cy="155" r="108" fill="url(#gHighlight)" clip-path="url(#sphereClip)"/>
    <!-- Rim darkening -->
    <circle cx="140" cy="155" r="108" fill="url(#gRim)"       clip-path="url(#sphereClip)"/>
    <!-- Halo / frosted glass edge -->
    <circle cx="140" cy="155" r="108" fill="url(#gHalo)"      clip-path="url(#sphereClip)"/>
  </g>

  <!-- 4-pointed star (sparkle) outline — straight sides, sharp tips -->
  <!-- Center: 140,155  Outer radius ~72  Inner notch radius ~24 at 45° diagonals -->
  <path d="
    M 140,83
    L 157,131 L 212,155
    L 157,179 L 140,227
    L 123,179 L 68,155
    L 123,131 Z
  "
    fill="none"
    stroke="rgba(255,245,240,0.80)"
    stroke-width="3"
    stroke-linejoin="miter"
    stroke-miterlimit="10"
    filter="url(#fStarGlow)"
  />

  <!-- Small sparkle (✦) in bottom-right corner -->
  <g transform="translate(234,300)">
    <path d="M0,-9 L2.2,-2.2 L9,0 L2.2,2.2 L0,9 L-2.2,2.2 L-9,0 L-2.2,-2.2 Z"
          fill="rgba(255,255,255,0.88)"/>
  </g>
</svg>
